workflows:

  # ─────────────────────────────────────────────
  # 침신 말씀노트 - iOS App Store 배포
  # Bundle ID: com.logosflow.chimshinBibleNote
  # Team ID:   NCB9774DGY
  # ─────────────────────────────────────────────
  chimshin-ios-release:
    name: Chimshin iOS Release
    max_build_duration: 60
    working_directory: chimshin

    integrations:
      app_store_connect: LuckyTenAPI    # ← integrations 위치 (environment 안 X)

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.logosflow.chimshinBibleNote
      groups:
        - chimshin                      # Codemagic 환경변수 그룹 (NOTIFY_SERVER_KEY)
      vars:
        BUNDLE_ID: "com.logosflow.chimshinBibleNote"
        WHISPER_SERVER_URL: "https://logosflow-production.up.railway.app"

    scripts:
      - name: GoogleService-Info.plist 복원
        script: |
          echo "$GOOGLESERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: .env 파일 생성
        script: |
          echo "FLAVOR=chimshin" > .env
          echo "APP_NAME=침신 말씀노트" >> .env
          echo "API_URL=https://asia-northeast3-chimshin-bible-note.cloudfunctions.net" >> .env
          echo "WHISPER_SERVER_URL=$WHISPER_SERVER_URL" >> .env
          echo "NOTIFY_SERVER_KEY=$NOTIFY_SERVER_KEY" >> .env

      - name: Flutter pub get
        script: flutter pub get

      - name: Fix -G flag (gRPC-Core arm64 incompatibility)
        script: |
          echo "=== Patching xcconfig files to remove -G/-G0 flag ==="
          find ios -name "*.xcconfig" | while read f; do
            if grep -q '\-G' "$f"; then
              echo "Patching: $f"
              sed -i '' 's/[[:space:]]*-G[^[:space:]]* / /g; s/[[:space:]]*-G[^[:space:]]*$//g' "$f"
            fi
          done
          echo "=== Done patching ==="

      - name: Xcode 서명 설정 적용
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: flutter build ipa --release --no-pub --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

