workflows:

  # ─────────────────────────────────────────────
  # 침신 말씀노트 - iOS App Store 배포
  # Bundle ID: com.logosflow.chimshinBibleNote
  # Team ID:   NCB9774DGY
  # ─────────────────────────────────────────────
  chimshin-ios-release:
    name: Chimshin iOS Release
    max_build_duration: 60
    working_directory: chimshin

    integrations:
      app_store_connect: LuckyTenAPI    # ← integrations 위치 (environment 안 X)

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.logosflow.chimshinBibleNote
      groups:
        - chimshin                      # Codemagic 환경변수 그룹 (OPENAI_API_KEY 등)
      vars:
        BUNDLE_ID: "com.logosflow.chimshinBibleNote"

    scripts:
      - name: .env 파일 생성
        script: |
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" > .env
          echo "WHISPER_SERVER_URL=$WHISPER_SERVER_URL" >> .env

      - name: Flutter pub get
        script: flutter pub get

      - name: Xcode 서명 설정 적용
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
